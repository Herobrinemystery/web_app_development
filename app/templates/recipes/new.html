{% extends "base.html" %}

{% block title %}新增食譜 - RecipeVault{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 0 auto;">
    <div class="auth-header" style="text-align: left; margin-bottom: 2rem;">
        <h2 style="margin: 0;">撰寫新食譜</h2>
        <p style="color: #94a3b8; font-size: 0.95rem;">分享您的美味秘方，記得填寫所需的食材！</p>
    </div>
    
    <form method="POST" action="{{ url_for('recipes.create_recipe') }}">
        <div class="form-group">
            <label for="title">食譜名稱 <span style="color: var(--error);">*</span></label>
            <input type="text" id="title" name="title" class="form-control" required placeholder="例如：紅燒肉、番茄炒蛋">
        </div>
        
        <div class="form-group">
            <label for="ingredients">所需食材</label>
            <input type="text" id="ingredients" name="ingredients" class="form-control" placeholder="請以逗號分隔，例如：豬肉, 醬油, 冰糖, 蔥">
            <small style="color: #94a3b8; display: block; margin-top: 0.5rem;">輸入食材能夠讓其他人透過「找食譜」功能更容易發掘這道菜！</small>
        </div>
        
        <div class="form-group">
            <label for="steps">製作步驟 <span style="color: var(--error);">*</span></label>
            <textarea id="steps" name="steps" class="form-control" rows="8" required placeholder="1. 先將食材洗淨...&#10;2. 放入鍋中快炒..."></textarea>
        </div>
        
        <div class="form-group" style="display: flex; align-items: center; gap: 0.75rem; margin-top: 2rem;">
            <input type="checkbox" id="is_public" name="is_public" style="width: 1.25rem; height: 1.25rem; cursor: pointer;">
            <label for="is_public" style="margin: 0; cursor: pointer; user-select: none;">公開這份食譜 (打勾後大家都可以看到)</label>
        </div>
        
        <hr style="border-color: var(--glass-border); margin: 2rem 0;">
        
        <div style="display: flex; justify-content: flex-end; gap: 1rem;">
            <a href="{{ url_for('recipes.my_recipes') }}" class="btn" style="background: rgba(255, 255, 255, 0.1);">取消</a>
            <button type="submit" class="btn" style="background: var(--accent);">完成並儲存</button>
        </div>
    </form>
</div>
{% endblock %}
